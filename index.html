<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceNote</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2025;
      --border: rgba(255,255,255,0.07);
      --text: #e8e9eb;
      --muted: #6b6f7a;
      --accent: #7c6fff;
      --accent-soft: rgba(124,111,255,0.12);
      --green: #4ade80;
      --green-soft: rgba(74,222,128,0.10);
      --red: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    .sitenav {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 0.25rem;
      margin-bottom: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.35rem;
    }
    .sitenav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.45rem 0.25rem;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .sitenav a:hover { color: var(--text); background: var(--surface2); }
    .sitenav a.active { color: var(--text); background: var(--surface2); }

    header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .main {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .input-panel textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: none;
      min-height: 100px;
    }

    .input-panel textarea::placeholder { color: var(--muted); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
    }

    .mic-btn:hover { background: var(--accent-soft); border-color: var(--accent); }

    .mic-btn.listening {
      background: var(--accent-soft);
      border-color: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124,111,255,0.25); }
      50% { box-shadow: 0 0 0 8px rgba(124,111,255,0); }
    }

    .mic-btn svg { width: 18px; height: 18px; }
    .mic-btn.listening svg path { fill: var(--accent); }

    .speak-btn {
      flex: 1;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .speak-btn:hover { background: var(--green-soft); border-color: var(--green); color: var(--green); }
    .speak-btn.speaking { background: var(--green-soft); border-color: var(--green); color: var(--green); }

    .save-btn {
      height: 44px;
      padding: 0 1.1rem;
      border-radius: 10px;
      border: 1px solid rgba(124,111,255,0.35);
      background: var(--accent-soft);
      color: #a89fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .save-btn:hover { background: rgba(124,111,255,0.2); }

    .status {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      min-height: 1.2em;
      padding: 0 0.25rem;
      transition: color 0.2s;
    }

    .status.active { color: var(--accent); }
    .status.speaking { color: var(--green); }

    .notes-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 0.25rem;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .note-card:hover { border-color: rgba(255,255,255,0.15); }
    .note-card:hover .note-speak { opacity: 1; }

    .note-text {
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text);
    }

    .note-time {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .note-speak {
      opacity: 0;
      transition: opacity 0.15s;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      color: var(--muted);
      display: flex;
      align-items: center;
    }

    .note-speak:hover { color: var(--green); }
    .note-speak svg { width: 15px; height: 15px; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 0.25rem;
    }

    .control-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .control-item select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.78rem;
      padding: 3px 6px;
      font-family: 'DM Mono', monospace;
    }

    .control-item input[type=range] {
      width: 80px;
      accent-color: var(--accent);
    }

    .divider {
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <nav class="sitenav">
    <a href="index.html" class="active">Voice</a>
    <a href="camera.html">Camera</a>
    <a href="orientation.html">Orientation</a>
    <a href="motion.html">Motion</a>
    <a href="battery.html">Battery</a>
  </nav>

  <header>
    <h1>VoiceNote</h1>
    <span>Web Speech API demo</span>
  </header>

  <div class="main">

    <div class="input-panel">
      <textarea id="noteText" placeholder="Type a note, or press the mic and speak..." rows="4"></textarea>
      <div class="input-actions">
        <button class="mic-btn" id="micBtn" title="Start voice input">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="micIcon" d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6 9a1 1 0 0 1 2 0 8.001 8.001 0 0 1-7 7.938V20h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.062A8.001 8.001 0 0 1 4 10a1 1 0 0 1 2 0 6 6 0 0 0 12 0z" fill="#6b6f7a"/>
          </svg>
        </button>
        <button class="speak-btn" id="speakBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          Read aloud
        </button>
        <button class="save-btn" id="saveBtn">Save note</button>
      </div>
    </div>

    <div class="status" id="status">ready</div>

    <div class="controls-row">
      <div class="control-item">
        voice
        <select id="voiceSelect"></select>
      </div>
      <div class="control-item">
        speed
        <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1" />
        <span id="rateVal">1.0x</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="notes-label">saved notes</div>

    <div class="notes-list" id="notesList">
      <div class="empty-state" id="emptyState">no notes yet — speak or type one above</div>
    </div>

  </div>

  <script>
    const textarea = document.getElementById('noteText')
    const micBtn = document.getElementById('micBtn')
    const speakBtn = document.getElementById('speakBtn')
    const saveBtn = document.getElementById('saveBtn')
    const statusEl = document.getElementById('status')
    const notesList = document.getElementById('notesList')
    const emptyState = document.getElementById('emptyState')
    const voiceSelect = document.getElementById('voiceSelect')
    const rateSlider = document.getElementById('rateSlider')
    const rateVal = document.getElementById('rateVal')

    let notes = []
    let isListening = false
    let isSpeaking = false
    let recognition = null
    let voices = []

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

    if (SpeechRecognition) {
      recognition = new SpeechRecognition()
      recognition.continuous = true
      recognition.interimResults = true
      recognition.lang = 'en-GB'

      recognition.onresult = (e) => {
        let interim = ''
        let final = ''
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript
          if (e.results[i].isFinal) final += t
          else interim += t
        }
        if (final) textarea.value += final + ' '
        setStatus(interim ? `hearing: "${interim}"` : 'listening...', 'active')
      }

      recognition.onerror = (e) => {
        setStatus('mic error: ' + e.error, '')
        stopListening()
      }

      recognition.onend = () => {
        if (isListening) recognition.start()
      }
    } else {
      micBtn.style.opacity = '0.3'
      micBtn.title = 'Speech recognition not supported in this browser'
    }

    micBtn.addEventListener('click', () => {
      isListening ? stopListening() : startListening()
    })

    function startListening() {
      if (!recognition) return
      isListening = true
      micBtn.classList.add('listening')
      recognition.start()
      setStatus('listening...', 'active')
    }

    function stopListening() {
      isListening = false
      micBtn.classList.remove('listening')
      if (recognition) recognition.stop()
      setStatus('ready', '')
    }

    function loadVoices() {
      voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'))
      voiceSelect.innerHTML = ''
      if (!voices.length) voices = speechSynthesis.getVoices()
      voices.forEach((v, i) => {
        const opt = document.createElement('option')
        opt.value = i
        opt.textContent = v.name.replace(/Microsoft |Google /, '').slice(0, 22)
        voiceSelect.appendChild(opt)
      })
    }

    speechSynthesis.onvoiceschanged = loadVoices
    loadVoices()

    rateSlider.addEventListener('input', () => {
      rateVal.textContent = parseFloat(rateSlider.value).toFixed(1) + 'x'
    })

    function speakText(text) {
      if (!text.trim()) return
      speechSynthesis.cancel()
      const utt = new SpeechSynthesisUtterance(text)
      utt.voice = voices[voiceSelect.value] || null
      utt.rate = parseFloat(rateSlider.value)
      utt.pitch = 1
      utt.onstart = () => {
        isSpeaking = true
        speakBtn.classList.add('speaking')
        speakBtn.textContent = 'Speaking...'
        setStatus('speaking...', 'speaking')
      }
      utt.onend = () => {
        isSpeaking = false
        speakBtn.classList.remove('speaking')
        speakBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> Read aloud`
        setStatus('ready', '')
      }
      speechSynthesis.speak(utt)
    }

    speakBtn.addEventListener('click', () => {
      if (isSpeaking) { speechSynthesis.cancel(); return }
      speakText(textarea.value)
    })

    saveBtn.addEventListener('click', () => {
      const text = textarea.value.trim()
      if (!text) return
      addNote(text)
      textarea.value = ''
      stopListening()
      setStatus('note saved', '')
      setTimeout(() => setStatus('ready', ''), 1500)
    })

    function addNote(text) {
      const now = new Date()
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
      notes.unshift({ text, time })
      renderNotes()
    }

    function renderNotes() {
      if (!notes.length) {
        emptyState.style.display = 'block'
        notesList.querySelectorAll('.note-card').forEach(c => c.remove())
        return
      }
      emptyState.style.display = 'none'
      notesList.innerHTML = ''
      notes.forEach((note) => {
        const card = document.createElement('div')
        card.className = 'note-card'
        card.innerHTML = `
          <div style="flex:1">
            <div class="note-text">${escHtml(note.text)}</div>
            <div class="note-time">${note.time}</div>
          </div>
          <button class="note-speak" title="Read this note aloud">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </button>
        `
        card.querySelector('.note-speak').addEventListener('click', (e) => {
          e.stopPropagation()
          speakText(note.text)
        })
        card.addEventListener('click', () => {
          textarea.value = note.text
          textarea.focus()
        })
        notesList.appendChild(card)
      })
    }

    function setStatus(msg, cls) {
      statusEl.textContent = msg
      statusEl.className = 'status ' + (cls || '')
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    addNote("Tap the mic and start talking — your words will appear above. Hit 'Read aloud' to hear them back.")
  </script>
</body>
</html>
